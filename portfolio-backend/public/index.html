<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #6366f1; }
    header h1 { color: #6366f1; font-size: 1.5rem; }
    header span { background: #22c55e; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .api-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
    .api-card { background: #1e293b; border-radius: 10px; padding: 15px; text-align: center; border: 1px solid #334155; }
    .api-card h4 { color: #94a3b8; font-size: 0.8rem; margin-bottom: 8px; }
    .api-card .endpoint { color: #6366f1; font-size: 0.75rem; margin-bottom: 8px; }
    .api-card .status { color: #22c55e; font-weight: bold; font-size: 0.85rem; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-size: 0.9rem; background: #1e293b; color: #94a3b8; transition: all 0.2s; }
    .tab.active { background: #6366f1; color: white; }
    .panel { display: none; }
    .panel.active { display: block; }
    .section-box { background: #1e293b; border-radius: 12px; padding: 25px; margin-bottom: 20px; border: 1px solid #334155; }
    .section-box h3 { color: #6366f1; margin-bottom: 20px; font-size: 1.1rem; }
    .form-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    input, textarea { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 15px; border-radius: 8px; font-size: 0.9rem; width: 100%; outline: none; }
    input:focus, textarea:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 80px; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
    .btn-add { background: #6366f1; color: white; }
    .btn-add:hover { background: #4f46e5; }
    .btn-delete { background: #ef4444; color: white; padding: 6px 12px; font-size: 0.8rem; }
    .btn-delete:hover { background: #dc2626; }
    .btn-save { background: #22c55e; color: white; }
    .btn-save:hover { background: #16a34a; }
    .item-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .item-card { background: #0f172a; border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: flex-start; border: 1px solid #334155; }
    .item-card .info h4 { color: #e2e8f0; margin-bottom: 4px; }
    .item-card .info p { color: #94a3b8; font-size: 0.85rem; }
    .skill-tag { display: inline-flex; align-items: center; gap: 8px; background: #0f172a; border: 1px solid #334155; padding: 6px 12px; border-radius: 20px; margin: 5px; font-size: 0.85rem; }
    .skill-tag button { background: #ef4444; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
    .skills-container { display: flex; flex-wrap: wrap; margin-top: 10px; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #22c55e; color: white; padding: 12px 25px; border-radius: 8px; font-size: 0.9rem; display: none; z-index: 999; }
    .profile-field { margin-bottom: 15px; }
    .profile-field label { display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 6px; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Portfolio Admin Panel</h1>
  <span id="serverStatus">● API Running</span>
</header>

<div class="container">

  <!-- API Status Cards -->
  <div class="api-status">
    <div class="api-card">
      <h4>PROFILE API</h4>
      <div class="endpoint">/api/profile</div>
      <div class="status" id="s1">Checking...</div>
    </div>
    <div class="api-card">
      <h4>SKILLS API</h4>
      <div class="endpoint">/api/skills</div>
      <div class="status" id="s2">Checking...</div>
    </div>
    <div class="api-card">
      <h4>PROJECTS API</h4>
      <div class="endpoint">/api/projects</div>
      <div class="status" id="s3">Checking...</div>
    </div>
    <div class="api-card">
      <h4>CONTACT API</h4>
      <div class="endpoint">/api/contact</div>
      <div class="status" id="s4">Checking...</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('profile')">👤 Profile</button>
    <button class="tab" onclick="switchTab('skills')">🛠 Skills</button>
    <button class="tab" onclick="switchTab('projects')">📁 Projects</button>
    <button class="tab" onclick="switchTab('contact')">📞 Contact</button>
  </div>

  <!-- PROFILE PANEL -->
  <div class="panel active" id="panel-profile">
    <div class="section-box">
      <h3>👤 Edit Profile</h3>
      <div class="profile-field"><label>Full Name</label><input id="p-name" type="text"></div>
      <div class="profile-field"><label>Role</label><input id="p-role" type="text"></div>
      <div class="profile-field"><label>Organization</label><input id="p-org" type="text"></div>
      <div class="profile-field"><label>Bio</label><textarea id="p-bio"></textarea></div>
      <button class="btn btn-save" onclick="saveProfile()">💾 Save Profile</button>
    </div>
  </div>

  <!-- SKILLS PANEL -->
  <div class="panel" id="panel-skills">
    <div class="section-box">
      <h3>🛠 Manage Skills</h3>
      <div class="form-row">
        <input id="new-skill" type="text" placeholder="e.g. TensorFlow">
        <button class="btn btn-add" onclick="addSkill()">+ Add Skill</button>
      </div>
      <div class="skills-container" id="skills-list"></div>
    </div>
  </div>

  <!-- PROJECTS PANEL -->
  <div class="panel" id="panel-projects">
    <div class="section-box">
      <h3>➕ Add New Project</h3>
      <div class="profile-field"><label>Project Title</label><input id="proj-title" type="text" placeholder="e.g. Sales Dashboard"></div>
      <div class="profile-field"><label>Description</label><textarea id="proj-desc" placeholder="Describe the project..."></textarea></div>
      <button class="btn btn-add" onclick="addProject()">+ Add Project</button>
    </div>
    <div class="section-box">
      <h3>📁 Current Projects</h3>
      <div class="item-list" id="projects-list"></div>
    </div>
  </div>

  <!-- CONTACT PANEL -->
  <div class="panel" id="panel-contact">
    <div class="section-box">
      <h3>📞 Edit Contact Info</h3>
      <div class="profile-field"><label>Phone</label><input id="c-phone" type="text"></div>
      <div class="profile-field"><label>Email</label><input id="c-email" type="text"></div>
      <button class="btn btn-save" onclick="saveContact()">💾 Save Contact</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  let state = {
    profile: {},
    skills: [],
    projects: [],
    contact: {}
  };

  // ── Toast ──────────────────────────────────────────────
  function showToast(msg, color = '#22c55e') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  // ── Tabs ───────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  }

  // ── Check API Status ───────────────────────────────────
  async function checkAPIs() {
    const routes = [
      { id: 's1', url: '/api/profile' },
      { id: 's2', url: '/api/skills' },
      { id: 's3', url: '/api/projects' },
      { id: 's4', url: '/api/contact' }
    ];
    for (let r of routes) {
      try {
        const res = await fetch(r.url);
        const el = document.getElementById(r.id);
        el.textContent = res.ok ? '● Online' : '● Error';
        el.style.color = res.ok ? '#22c55e' : '#ef4444';
      } catch {
        const el = document.getElementById(r.id);
        el.textContent = '● Offline';
        el.style.color = '#ef4444';
      }
    }
  }

  // ── Load All Data ──────────────────────────────────────
  async function loadAll() {
    try {
      const [p, s, pr, c] = await Promise.all([
        fetch('/api/profile').then(r => r.json()),
        fetch('/api/skills').then(r => r.json()),
        fetch('/api/projects').then(r => r.json()),
        fetch('/api/contact').then(r => r.json())
      ]);
      state.profile = p;
      state.skills = s.skills;
      state.projects = pr.projects;
      state.contact = c;
      renderAll();
    } catch(e) { console.error(e); }
  }

  function renderAll() {
    // Profile
    document.getElementById('p-name').value = state.profile.name || '';
    document.getElementById('p-role').value = state.profile.role || '';
    document.getElementById('p-org').value = state.profile.organization || '';
    document.getElementById('p-bio').value = state.profile.bio || '';
    // Contact
    document.getElementById('c-phone').value = state.contact.phone || '';
    document.getElementById('c-email').value = state.contact.email || '';
    // Skills
    renderSkills();
    // Projects
    renderProjects();
  }

  // ── Skills ─────────────────────────────────────────────
  function renderSkills() {
    const c = document.getElementById('skills-list');
    c.innerHTML = state.skills.map((s, i) => `
      <div class="skill-tag">
        ${s}
        <button onclick="deleteSkill(${i})">✕</button>
      </div>`).join('');
  }

  function addSkill() {
    const input = document.getElementById('new-skill');
    const val = input.value.trim();
    if (!val) return showToast('Enter a skill name', '#ef4444');
    state.skills.push(val);
    input.value = '';
    renderSkills();
    syncSkills();
    showToast('Skill added!');
  }

  function deleteSkill(i) {
    state.skills.splice(i, 1);
    renderSkills();
    syncSkills();
    showToast('Skill removed!', '#f59e0b');
  }

  async function syncSkills() {
    await fetch('/api/skills/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ skills: state.skills })
    });
  }

  // ── Projects ───────────────────────────────────────────
  function renderProjects() {
    const c = document.getElementById('projects-list');
    if (!state.projects.length) {
      c.innerHTML = '<p style="color:#94a3b8">No projects yet.</p>';
      return;
    }
    c.innerHTML = state.projects.map((p, i) => `
      <div class="item-card">
        <div class="info">
          <h4>${p.title}</h4>
          <p>${p.description}</p>
        </div>
        <button class="btn btn-delete" onclick="deleteProject(${i})">🗑 Delete</button>
      </div>`).join('');
  }

  function addProject() {
    const title = document.getElementById('proj-title').value.trim();
    const desc = document.getElementById('proj-desc').value.trim();
    if (!title || !desc) return showToast('Fill in both fields', '#ef4444');
    state.projects.push({ title, description: desc });
    document.getElementById('proj-title').value = '';
    document.getElementById('proj-desc').value = '';
    renderProjects();
    syncProjects();
    showToast('Project added!');
  }

  function deleteProject(i) {
    state.projects.splice(i, 1);
    renderProjects();
    syncProjects();
    showToast('Project deleted!', '#f59e0b');
  }

  async function syncProjects() {
    await fetch('/api/projects/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projects: state.projects })
    });
  }

  // ── Save Profile ───────────────────────────────────────
  async function saveProfile() {
    state.profile = {
      name: document.getElementById('p-name').value,
      role: document.getElementById('p-role').value,
      organization: document.getElementById('p-org').value,
      bio: document.getElementById('p-bio').value
    };
    await fetch('/api/profile/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.profile)
    });
    showToast('Profile saved!');
  }

  // ── Save Contact ───────────────────────────────────────
  async function saveContact() {
    state.contact = {
      phone: document.getElementById('c-phone').value,
      email: document.getElementById('c-email').value
    };
    await fetch('/api/contact/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.contact)
    });
    showToast('Contact saved!');
  }

  // ── Init ───────────────────────────────────────────────
  checkAPIs();
  loadAll();
</script>
</body>
</html>
